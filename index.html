<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mikey OS | Mobile Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow-x: hidden; }
        .nav-bottom { shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .active-nav { color: #4f46e5 !important; transform: translateY(-5px); }
        .order-card { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .dark-mode { background: #0f172a !important; color: white !important; }
        .dark-mode .bg-white { background: #1e293b !important; color: white !important; border-color: #334155 !important; }
    </style>
</head>
<body id="admin-body" class="pb-24">

    <header class="bg-white p-4 sticky top-0 z-50 border-b flex justify-between items-center">
        <div>
            <h1 class="text-lg font-black text-indigo-600 italic">MIKEY <span class="text-slate-800 dark:text-white">OS</span></h1>
            <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Cafe Manager v2</p>
        </div>
        <div class="flex gap-4 items-center">
            <span id="live-dot" class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
            <button onclick="toggleTheme()" class="text-slate-400 text-xl"><i class="fa-solid fa-moon"></i></button>
        </div>
    </header>

    <main class="p-4" id="main-content">
        
        <section id="tab-dash" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-[2rem] border shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Aaj ki Sales</p>
                    <h2 id="stat-sales" class="text-xl font-black italic">₹0</h2>
                </div>
                <div class="bg-white p-5 rounded-[2rem] border shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Orders</p>
                    <h2 id="stat-orders" class="text-xl font-black italic">0</h2>
                </div>
            </div>
            <div class="bg-white p-4 rounded-[2rem] border shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-4">Sales Graph</p>
                <div class="h-32 bg-slate-50 rounded-2xl flex items-end justify-around p-2 gap-1">
                    <div class="w-4 bg-indigo-200 rounded-t-lg h-1/2"></div>
                    <div class="w-4 bg-indigo-400 rounded-t-lg h-3/4"></div>
                    <div class="w-4 bg-indigo-600 rounded-t-lg h-full"></div>
                </div>
            </div>
        </section>

        <section id="tab-kitchen" class="hidden space-y-4">
            <h2 class="text-xl font-black italic mb-4 text-center">Live <span class="text-indigo-600">Orders</span></h2>
            <div id="kot-list" class="space-y-4">
                <p class="text-center text-slate-400 text-xs font-bold py-10 uppercase">No active orders</p>
            </div>
        </section>

        <section id="tab-settings" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm">
                <h3 class="font-black text-xs uppercase mb-4 text-indigo-600">Add New Dish</h3>
                <div class="space-y-3">
                    <input id="item-name" type="text" placeholder="Dish Name" class="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none font-bold text-sm">
                    <input id="item-price" type="number" placeholder="Price (₹)" class="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none font-bold text-sm">
                    <select id="item-cat" class="w-full bg-slate-50 p-4 rounded-2xl border-none outline-none font-bold text-sm">
                        <option>Burgers</option>
                        <option>Cold Coffee</option>
                        <option>Pizza</option>
                        <option>Snacks</option>
                    </select>
                    <button onclick="addItem()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest">Save Dish</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm">
                <h3 class="font-black text-xs uppercase mb-4">Quick Control</h3>
                <div class="flex justify-between items-center py-2">
                    <span class="font-bold text-sm text-center">Dark Interface</span>
                    <button onclick="toggleTheme()" class="w-12 h-6 bg-slate-200 rounded-full relative">
                        <div id="dot" class="w-4 h-4 bg-white rounded-full absolute left-1 top-1 transition-all"></div>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around items-center nav-bottom z-[60]">
        <button onclick="showTab('dash')" id="nav-dash" class="flex flex-col items-center gap-1 active-nav transition-all">
            <i class="fa-solid fa-house-chimney text-xl"></i>
            <span class="text-[8px] font-black uppercase">Home</span>
        </button>
        <button onclick="showTab('kitchen')" id="nav-kitchen" class="flex flex-col items-center gap-1 text-slate-300 transition-all">
            <i class="fa-solid fa-fire-burner text-xl"></i>
            <span class="text-[8px] font-black uppercase">Orders</span>
        </button>
        <button onclick="showTab('settings')" id="nav-settings" class="flex flex-col items-center gap-1 text-slate-300 transition-all">
            <i class="fa-solid fa-sliders text-xl"></i>
            <span class="text-[8px] font-black uppercase">Setup</span>
        </button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlpRY4QJpcaZhR6PRshFBEaIt63zbammI",
            authDomain: "chaska-pos-4fb1a.firebaseapp.com",
            databaseURL: "https://chaska-pos-4fb1a-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "chaska-pos-4fb1a",
            storageBucket: "chaska-pos-4fb1a.firebasestorage.app",
            messagingSenderId: "878605199091",
            appId: "1:878605199091:web:2fd2757f8edd8e804bb986"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Navigation Logic
        function showTab(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById('nav-' + id).classList.add('active-nav');
        }

        // Dark Mode Logic
        let isDark = false;
        function toggleTheme() {
            isDark = !isDark;
            document.getElementById('admin-body').classList.toggle('dark-mode');
            document.getElementById('dot').style.left = isDark ? '28px' : '4px';
        }

        // Live Orders Tracking
        db.ref('orders').on('value', snap => {
            const list = document.getElementById('kot-list');
            list.innerHTML = '';
            let sales = 0; let totalOrders = 0;

            snap.forEach(child => {
                const order = child.val();
                totalOrders++;
                if(order.status === 'pending') {
                    list.innerHTML += `
                    <div class="order-card bg-white p-5 rounded-[2rem] border shadow-sm border-l-4 border-l-orange-500">
                        <div class="flex justify-between mb-2">
                            <span class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-[9px] font-black uppercase">Pending</span>
                            <span class="font-black text-xs text-indigo-600">Table ${order.table_no}</span>
                        </div>
                        <h4 class="font-black text-sm uppercase leading-tight">${order.items}</h4>
                        ${order.instruction ? `<p class="text-[10px] text-red-500 font-bold mt-2 italic">Note: ${order.instruction}</p>` : ''}
                        <button onclick="markReady('${child.key}')" class="w-full mt-4 bg-slate-900 text-white py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest">Mark as Ready ✅</button>
                    </div>`;
                }
                sales += order.bill_amount || 0;
            });
            document.getElementById('stat-sales').innerText = "₹" + sales;
            document.getElementById('stat-orders').innerText = totalOrders;
        });

        function markReady(key) {
            db.ref('orders/' + key).update({ status: 'ready' });
        }

        function addItem() {
            const name = document.getElementById('item-name').value;
            const price = document.getElementById('item-price').value;
            const cat = document.getElementById('item-cat').value;
            if(!name || !price) return alert("Details bharo!");
            
            db.ref('menu').push({ name, price: parseInt(price), category: cat, inStock: true });
            alert("Dish added!");
            document.getElementById('item-name').value = '';
            document.getElementById('item-price').value = '';
        }
    </script>
</body>
            </html>
