<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaska Cafe - Smart Menu</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        .active-pill { background-color: #ea580c !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(234, 88, 12, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 pb-44">

    <div class="bg-white p-6 shadow-sm sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black text-orange-600 italic leading-none">CHASKA CAFE</h1>
            <p id="table-id" class="text-[10px] font-bold text-slate-400 mt-1 tracking-widest uppercase">TABLE: LOADING...</p>
        </div>
        <div class="bg-green-100 text-green-700 px-2 py-1 rounded text-[9px] font-black uppercase">100% VEG</div>
    </div>

    <div class="flex gap-3 overflow-x-auto p-4 no-scrollbar sticky top-[82px] bg-slate-50/90 backdrop-blur-md z-40">
        <button onclick="filterMenu('Pizza', this)" class="category-btn active-pill bg-white text-slate-600 px-6 py-2.5 rounded-2xl text-sm font-bold border shadow-sm whitespace-nowrap">🍕 Pizza</button>
        <button onclick="filterMenu('Maggi', this)" class="category-btn bg-white text-slate-600 px-6 py-2.5 rounded-2xl text-sm font-bold border shadow-sm whitespace-nowrap">🍜 Maggi</button>
        <button onclick="filterMenu('Drinks', this)" class="category-btn bg-white text-slate-600 px-6 py-2.5 rounded-2xl text-sm font-bold border shadow-sm whitespace-nowrap">🥤 Drinks</button>
    </div>

    <div id="full-menu" class="px-4 space-y-4"></div>

    <div id="cart-drawer" class="hidden fixed bottom-24 left-4 right-4 bg-white p-5 rounded-[2.5rem] shadow-2xl z-[100] border">
        <h3 class="text-slate-800 font-black text-xs mb-4 flex justify-between uppercase">
            <span>Your Order</span>
            <button onclick="clearCart()" class="text-red-500">Clear</button>
        </h3>
        <div id="items-list" class="space-y-2 max-h-40 overflow-y-auto font-bold text-sm text-slate-700 italic"></div>
    </div>

    <div id="order-bar" class="hidden fixed bottom-6 left-4 right-4 bg-slate-900 text-white p-5 rounded-[2.5rem] shadow-2xl flex justify-between items-center z-[110]">
        <div>
            <p id="total-count" class="text-[10px] font-black text-orange-500 tracking-widest uppercase">0 Items</p>
            <p id="total-price" class="text-2xl font-black">₹0</p>
        </div>
        <button onclick="sendOrder()" id="send-btn" class="bg-orange-600 px-10 py-4 rounded-[1.8rem] font-black text-sm uppercase">Place Order 🚀</button>
    </div>

    <script>
        // --- FIREBASE CONFIG (Yahan apni details bharo) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            databaseURL: "https://chaska-pos-4fb1a-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "chaska-pos-4fb1a",
            storageBucket: "chaska-pos-4fb1a.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const menuItems = [
            { name: 'Kulhad Pizza', price: 149, cat: 'Pizza', emoji: '🏺' },
            { name: 'Paneer Maggi', price: 70, cat: 'Maggi', emoji: '🍜' },
            { name: 'Cold Coffee', price: 120, cat: 'Drinks', emoji: '🥤' }
        ];

        let cart = [];
        let total = 0;
        const params = new URLSearchParams(window.location.search);
        const tableNo = params.get('table') || "Walking";
        document.getElementById('table-id').innerText = "TABLE: #" + tableNo;

        function filterMenu(category, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active-pill'));
            if(btn) btn.classList.add('active-pill');
            const container = document.getElementById('full-menu');
            container.innerHTML = '';
            menuItems.filter(i => i.cat === category).forEach(item => {
                container.innerHTML += `<div class="bg-white p-4 rounded-[2rem] shadow-sm flex justify-between items-center border">
                    <div class="flex items-center gap-4">
                        <div class="w-14 h-14 bg-orange-50 rounded-2xl flex items-center justify-center text-3xl">${item.emoji}</div>
                        <div><h3 class="font-bold text-slate-800 text-sm">${item.name}</h3><p class="text-orange-600 font-black">₹${item.price}</p></div>
                    </div>
                    <button onclick="addToCart('${item.name}', ${item.price})" class="border-2 border-green-500 text-green-600 px-6 py-2 rounded-xl font-black text-[10px] uppercase">Add</button>
                </div>`;
            });
        }

        function addToCart(name, price) {
            const id = Date.now();
            cart.push({ id, name, price });
            total += price;
            renderCart();
        }

        function removeItem(id) {
            const idx = cart.findIndex(i => i.id === id);
            if(idx > -1) { total -= cart[idx].price; cart.splice(idx, 1); }
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('items-list');
            list.innerHTML = '';
            if(cart.length > 0) {
                document.getElementById('cart-drawer').classList.remove('hidden');
                document.getElementById('order-bar').classList.remove('hidden');
                cart.forEach(i => {
                    list.innerHTML += `<div class="flex justify-between border-b pb-2"><span>${i.name}</span>
                    <button onclick="removeItem(${i.id})" class="text-red-400">✕</button></div>`;
                });
            } else { clearCart(); }
            document.getElementById('total-count').innerText = cart.length + " Items";
            document.getElementById('total-price').innerText = "₹" + total;
        }

        function clearCart() {
            cart = []; total = 0;
            document.getElementById('cart-drawer').classList.add('hidden');
            document.getElementById('order-bar').classList.add('hidden');
        }

        async function sendOrder() {
            const btn = document.getElementById('send-btn');
            btn.innerText = "Wait..."; btn.disabled = true;
            const itemNames = cart.map(i => i.name).join(", ");
            
            db.ref('orders').push({
                items: itemNames,
                table_no: tableNo,
                status: "pending",
                timestamp: Date.now()
            }, (err) => {
                if(!err) { alert("Order Done! ✅"); clearCart(); }
                else { alert("Error!"); }
                btn.innerText = "Place Order 🚀"; btn.disabled = false;
            });
        }
        window.onload = () => filterMenu('Pizza');
    </script>
</body>
</html>
