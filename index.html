<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaska Cafe - Smart POS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-pill { background-color: #ea580c !important; color: white !important; transform: scale(1.05); box-shadow: 0 10px 15px -3px rgba(234, 88, 12, 0.3); }
        .category-btn { transition: all 0.2s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-item { animation: slideUp 0.4s ease forwards; }
    </style>
</head>
<body class="bg-slate-50 pb-44">

    <div class="bg-white p-6 shadow-sm sticky top-0 z-50 flex justify-between items-center border-b border-slate-100">
        <div>
            <h1 class="text-3xl font-black text-orange-600 italic leading-none tracking-tighter">CHASKA CAFE</h1>
            <p id="table-id" class="text-[10px] font-bold text-slate-400 mt-1 tracking-[3px] uppercase">TABLE: LOADING...</p>
        </div>
        <div class="bg-green-100 text-green-700 px-2 py-1 rounded text-[9px] font-black uppercase tracking-tighter">100% VEG</div>
    </div>

    <div class="flex gap-3 overflow-x-auto p-4 no-scrollbar sticky top-[82px] bg-slate-50/90 backdrop-blur-md z-40">
        <button onclick="filterMenu('Popular', this)" class="category-btn active-pill bg-white text-slate-600 px-6 py-2.5 rounded-2xl text-sm font-bold border border-slate-200 shadow-sm whitespace-nowrap">🔥 Popular</button>
        <button onclick="filterMenu('Pizza', this)" class="category-btn bg-white text-slate-600 px-6 py-2.5 rounded-2xl text-sm font-bold border border-slate-200 shadow-sm whitespace-nowrap">🍕 Pizza</button>
        <button onclick="filterMenu('Maggi', this)" class="category-btn bg-white text-slate-600 px-6 py-2.5 rounded-2xl text-sm font-bold border border-slate-200 shadow-sm whitespace-nowrap">🍜 Maggi</button>
        <button onclick="filterMenu('Drinks', this)" class="category-btn bg-white text-slate-600 px-6 py-2.5 rounded-2xl text-sm font-bold border border-slate-200 shadow-sm whitespace-nowrap">🥤 Drinks</button>
        <button onclick="filterMenu('All', this)" class="category-btn bg-white text-slate-600 px-6 py-2.5 rounded-2xl text-sm font-bold border border-slate-200 shadow-sm whitespace-nowrap">Full Menu</button>
    </div>

    <div id="full-menu" class="px-4 space-y-4 min-h-[300px]"></div>

    <div id="cart-drawer" class="hidden fixed bottom-24 left-4 right-4 bg-white p-5 rounded-[2.5rem] shadow-[0_-15px_50px_rgba(0,0,0,0.15)] z-[100] border border-slate-100">
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4"></div>
        <h3 class="text-slate-800 font-black text-xs mb-4 flex justify-between items-center uppercase tracking-widest px-2">
            <span>Your Selection</span>
            <button onclick="clearCart()" class="text-red-500 font-bold text-[10px] bg-red-50 px-3 py-1 rounded-full">Clear All</button>
        </h3>
        <div id="items-list" class="space-y-3 max-h-40 overflow-y-auto px-2 font-bold text-sm text-slate-700 italic">
            </div>
    </div>

    <div id="order-bar" class="hidden fixed bottom-6 left-4 right-4 bg-slate-900 text-white p-5 rounded-[2.5rem] shadow-2xl flex justify-between items-center z-[110] border border-slate-700">
        <div class="pl-2">
            <p id="total-count" class="text-[10px] font-black text-orange-500 tracking-widest uppercase">0 Items</p>
            <p id="total-price" class="text-2xl font-black">₹0</p>
        </div>
        <button onclick="sendOrder()" id="send-btn" class="bg-orange-600 px-10 py-4 rounded-[1.8rem] font-black text-sm shadow-lg active:scale-95 transition-all uppercase tracking-tight">
            Place Order 🚀
        </button>
    </div>

    <script>
        // 1. CONFIG (Apna URL yahan dalo)
        const SUPABASE_URL = 'https://YOUR_PROJECT_URL.supabase.co'; 
        const SUPABASE_KEY = 'bnhgpbzyifpgwrnenvip'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. DATA
        const menuItems = [
            { name: 'Kulhad Pizza', price: 149, cat: 'Pizza', emoji: '🏺' },
            { name: 'Cheese Pizza', price: 199, cat: 'Pizza', emoji: '🍕' },
            { name: 'Peri Peri Maggi', price: 70, cat: 'Maggi', emoji: '🍜' },
            { name: 'Cold Coffee', price: 120, cat: 'Drinks', emoji: '🥤' },
            { name: 'Chaska Chai', price: 20, cat: 'Drinks', emoji: '☕' },
            { name: 'Cheese Burger', price: 89, cat: 'Popular', emoji: '🍔' }
        ];

        let cart = [];
        let total = 0;

        const params = new URLSearchParams(window.location.search);
        const tableNo = params.get('table') || "Walking";
        document.getElementById('table-id').innerText = "TABLE: #" + tableNo;

        // 3. LOGIC: LIVE POPULAR TRENDS
        async function getPopularItems() {
            const { data: orders, error } = await _supabase.from('orders').select('items');
            if (error || !orders || orders.length === 0) return menuItems.filter(i => i.cat === 'Popular');
            
            let counts = {};
            orders.forEach(order => {
                order.items.split(", ").forEach(item => { counts[item] = (counts[item] || 0) + 1; });
            });

            const sorted = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
            const topNames = sorted.slice(0, 4);
            const livePopular = menuItems.filter(item => topNames.includes(item.name));
            return livePopular.length > 0 ? livePopular : menuItems.filter(i => i.cat === 'Popular');
        }

        // 4. LOGIC: FILTER & RENDER
        async function filterMenu(category, btn) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active-pill'));
            if(btn) btn.classList.add('active-pill');

            const container = document.getElementById('full-menu');
            container.innerHTML = '<div class="h-40 flex items-center justify-center text-slate-400 font-black animate-pulse text-[10px] tracking-widest uppercase">Checking Trends...</div>';

            let displayList = (category === 'Popular') ? await getPopularItems() : menuItems.filter(item => item.cat === category || category === 'All');

            container.innerHTML = '';
            displayList.forEach((item, index) => {
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-[2rem] shadow-sm border border-slate-100 flex justify-between items-center animate-item" style="animation-delay: ${index * 0.1}s">
                        <div class="flex items-center gap-4">
                            <div class="w-16 h-16 bg-orange-50 rounded-2xl flex items-center justify-center text-4xl">${item.emoji}</div>
                            <div>
                                <h3 class="font-bold text-slate-800 text-sm">${item.name}</h3>
                                <p class="text-orange-600 font-black">₹${item.price}</p>
                            </div>
                        </div>
                        <button onclick="addToCart('${item.name}', ${item.price})" class="bg-white text-green-600 border-2 border-green-500 px-6 py-2 rounded-xl font-black text-[10px] uppercase shadow-sm active:bg-green-50 active:scale-90 transition-all">Add</button>
                    </div>`;
            });
        }

        // 5. LOGIC: SMART CART (With Single Item Delete)
        function addToCart(name, price) {
            const itemId = Date.now(); 
            cart.push({ id: itemId, name: name, price: price });
            total += price;
            renderCart();
            if (navigator.vibrate) navigator.vibrate(40);
        }

        function removeItem(id) {
            const index = cart.findIndex(i => i.id === id);
            if (index > -1) {
                total -= cart[index].price;
                cart.splice(index, 1);
            }
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('items-list');
            const drawer = document.getElementById('cart-drawer');
            const bar = document.getElementById('order-bar');
            
            list.innerHTML = '';
            if (cart.length > 0) {
                drawer.classList.remove('hidden'); bar.classList.remove('hidden');
                cart.forEach((item) => {
                    list.innerHTML += `
                        <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                            <div class="flex flex-col"><span class="text-slate-800">${item.name}</span><span class="text-orange-600 text-[10px]">₹${item.price}</span></div>
                            <button onclick="removeItem(${item.id})" class="text-red-400 p-2 bg-red-50 rounded-full">
                                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/></svg>
                            </button>
                        </div>`;
                });
            } else { clearCart(); }

            document.getElementById('total-count').innerText = cart.length + " Items Added";
            document.getElementById('total-price').innerText = "₹" + total;
        }

        function clearCart() {
            cart = []; total = 0;
            document.getElementById('items-list').innerHTML = '';
            document.getElementById('cart-drawer').classList.add('hidden');
            document.getElementById('order-bar').classList.add('hidden');
        }

        async function sendOrder() {
            const btn = document.getElementById('send-btn');
            btn.innerText = "SABAR KARO..."; btn.disabled = true;
            const itemNames = cart.map(i => i.name).join(", ");
            const { error } = await _supabase.from('orders').insert([{ items: itemNames, table_no: tableNo, status: 'pending' }]);

            if(!error) { alert("Hogaya Bhai! Chef ko bata diya hai. ✅"); clearCart(); }
            else { alert("Error! Check internet."); }
            btn.innerText = "Place Order 🚀"; btn.disabled = false;
        }

        window.onload = () => filterMenu('Popular');
    </script>
</body>
</html>
