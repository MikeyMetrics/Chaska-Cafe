<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaska Cafe - Digital Menu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .category-pill { transition: all 0.3s; cursor: pointer; }
        .category-pill:active { transform: scale(0.9); }
    </style>
</head>
<body class="bg-slate-50 pb-32">

    <div class="bg-white p-6 shadow-md sticky top-0 z-50">
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-black text-orange-600 italic leading-none">CHASKA CAFE</h1>
                <p id="table-id" class="text-[10px] font-bold text-slate-400 mt-1 tracking-[3px]">TABLE: LOADING...</p>
            </div>
            <div class="text-right">
                <span class="bg-green-100 text-green-700 px-2 py-1 rounded text-[10px] font-bold">100% VEG</span>
            </div>
        </div>
    </div>

    <div class="flex gap-3 overflow-x-auto p-4 no-scrollbar">
        <div class="category-pill bg-orange-600 text-white px-5 py-2 rounded-2xl text-sm font-bold shadow-lg">Popular</div>
        <div class="category-pill bg-white text-slate-600 px-5 py-2 rounded-2xl text-sm font-bold border border-slate-200 shadow-sm">Pizza</div>
        <div class="category-pill bg-white text-slate-600 px-5 py-2 rounded-2xl text-sm font-bold border border-slate-200 shadow-sm">Maggi</div>
        <div class="category-pill bg-white text-slate-600 px-5 py-2 rounded-2xl text-sm font-bold border border-slate-200 shadow-sm">Drinks</div>
    </div>

    <div id="full-menu" class="px-4 space-y-4">
        <h2 class="text-slate-800 font-black text-lg mt-6 mb-2 flex items-center gap-2">🔥 Best Sellers</h2>
        
        <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-orange-50 rounded-2xl flex items-center justify-center text-4xl">🏺</div>
                <div>
                    <h3 class="font-bold text-slate-800 text-sm">Kulhad Pizza</h3>
                    <p class="text-orange-600 font-black">₹149</p>
                </div>
            </div>
            <button onclick="addToCart('Kulhad Pizza', 149)" class="bg-white text-green-600 border border-green-500 px-6 py-2 rounded-xl font-black text-xs shadow-sm active:bg-green-50">ADD</button>
        </div>

        <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-orange-50 rounded-2xl flex items-center justify-center text-4xl">🥪</div>
                <div>
                    <h3 class="font-bold text-slate-800 text-sm">Cheese Grill Sandwich</h3>
                    <p class="text-orange-600 font-black">₹110</p>
                </div>
            </div>
            <button onclick="addToCart('Grill Sandwich', 110)" class="bg-white text-green-600 border border-green-500 px-6 py-2 rounded-xl font-black text-xs shadow-sm">ADD</button>
        </div>

        <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-orange-50 rounded-2xl flex items-center justify-center text-4xl">🍜</div>
                <div>
                    <h3 class="font-bold text-slate-800 text-sm">Peri Peri Maggi</h3>
                    <p class="text-orange-600 font-black">₹89</p>
                </div>
            </div>
            <button onclick="addToCart('Peri Peri Maggi', 89)" class="bg-white text-green-600 border border-green-500 px-6 py-2 rounded-xl font-black text-xs shadow-sm">ADD</button>
        </div>

        <h2 class="text-slate-800 font-black text-lg mt-8 mb-2 flex items-center gap-2">🥤 Thanda & Beverages</h2>

        <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center text-4xl">🍦</div>
                <div>
                    <h3 class="font-bold text-slate-800 text-sm">Cold Coffee (Premium)</h3>
                    <p class="text-orange-600 font-black">₹120</p>
                </div>
            </div>
            <button onclick="addToCart('Cold Coffee', 120)" class="bg-white text-green-600 border border-green-500 px-6 py-2 rounded-xl font-black text-xs shadow-sm">ADD</button>
        </div>

        <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center text-4xl">🍹</div>
                <div>
                    <h3 class="font-bold text-slate-800 text-sm">Fresh Mint Mojito</h3>
                    <p class="text-orange-600 font-black">₹99</p>
                </div>
            </div>
            <button onclick="addToCart('Mint Mojito', 99)" class="bg-white text-green-600 border border-green-500 px-6 py-2 rounded-xl font-black text-xs shadow-sm">ADD</button>
        </div>
    </div>

    <div id="cart-bar" class="hidden fixed bottom-6 left-4 right-4 bg-slate-900 text-white p-5 rounded-[2rem] shadow-2xl flex justify-between items-center z-[100] border-t border-slate-700">
        <div>
            <p id="total-items" class="text-[10px] font-black text-orange-500 tracking-widest uppercase">0 Items Added</p>
            <p id="total-price" class="text-xl font-black">₹0</p>
        </div>
        <button onclick="sendOrderToSupabase()" id="order-btn" class="bg-orange-600 px-8 py-3 rounded-2xl font-black text-sm tracking-wide shadow-lg active:scale-95 transition-all">
            PLACE ORDER 🚀
        </button>
    </div>

    <script>
        const SUPABASE_URL = 'https://YOUR_URL_HERE.supabase.co'; // <--- TERA URL DAALNA
        const SUPABASE_KEY = 'bnhgpbzyifpgwrnenvip'; // <--- TERI KEY SET HAI
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let cart = [];
        let total = 0;

        // Auto Table Detect from URL (e.g., site.com?table=3)
        const urlParams = new URLSearchParams(window.location.search);
        const tableNo = urlParams.get('table') || "Walking";
        document.getElementById('table-id').innerText = "TABLE: #" + tableNo;

        function addToCart(name, price) {
            cart.push(name);
            total += price;
            
            const bar = document.getElementById('cart-bar');
            bar.classList.remove('hidden');
            document.getElementById('total-items').innerText = cart.length + " Items Added";
            document.getElementById('total-price').innerText = "₹" + total;

            if (navigator.vibrate) navigator.vibrate(40);
        }

        async function sendOrderToSupabase() {
            const btn = document.getElementById('order-btn');
            btn.innerText = "WAIT...";
            btn.disabled = true;

            const { data, error } = await _supabase
                .from('orders')
                .insert([{ 
                    items: cart.join(", "), 
                    table_no: tableNo, 
                    status: 'pending' 
                }]);

            if(!error) {
                alert("Order Placed! 🚀 Kitchen mein notification chala gaya.");
                cart = []; total = 0;
                document.getElementById('cart-bar').classList.add('hidden');
            } else {
                alert("Internet Error! Try again.");
            }
            btn.innerText = "PLACE ORDER 🚀";
            btn.disabled = false;
        }
    </script>
</body>
  </html>
