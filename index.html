<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikey Metrics | Admin OS</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
        .dark-mode { background: #0f172a !important; color: white !important; }
        .dark-mode .card, .dark-mode aside { background: #1e293b !important; border-color: #334155 !important; color: white !important; }
        .nav-active { background: #4f46e5; color: white; box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.5); }
        .card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex h-screen overflow-hidden bg-slate-50 text-slate-800" id="admin-body">

    <aside class="w-64 bg-white border-r flex flex-col p-6 shrink-0">
        <div class="mb-8 text-center pb-6 border-b">
            <h1 class="text-xl font-black text-indigo-600 italic">MIKEY OS</h1>
            <p class="text-[9px] font-bold text-slate-400 uppercase mt-1">v2.0 Premium</p>
        </div>
        <nav class="space-y-1 flex-1 text-sm font-bold">
            <button onclick="showTab('dash')" id="btn-dash" class="nav-active w-full p-4 rounded-2xl flex items-center gap-3"><i class="fa-solid fa-chart-line"></i> Dashboard</button>
            <button onclick="showTab('kitchen')" id="btn-kitchen" class="w-full p-4 text-slate-400 rounded-2xl flex items-center gap-3"><i class="fa-solid fa-fire"></i> Orders</button>
            <button onclick="showTab('inventory')" id="btn-inventory" class="w-full p-4 text-slate-400 rounded-2xl flex items-center gap-3"><i class="fa-solid fa-utensils"></i> Menu List</button>
            <button onclick="showTab('tables')" id="btn-tables" class="w-full p-4 text-slate-400 rounded-2xl flex items-center gap-3"><i class="fa-solid fa-qrcode"></i> QR Setup</button>
            <button onclick="showTab('settings')" id="btn-settings" class="w-full p-4 text-slate-400 rounded-2xl flex items-center gap-3"><i class="fa-solid fa-gear"></i> Settings</button>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        
        <section id="tab-dash">
            <h2 class="text-2xl font-black mb-6 italic">Live <span class="text-indigo-600">Analytics</span></h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="card p-6 border-b-4 border-indigo-500 text-center">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Sales (Today)</p>
                    <h3 id="stat-sales" class="text-2xl font-black italic">₹0</h3>
                </div>
                <div class="card p-6 border-b-4 border-green-500 text-center">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Total Orders</p>
                    <h3 id="stat-orders" class="text-2xl font-black italic">0</h3>
                </div>
            </div>
            <div class="card p-6"><canvas id="mainChart" height="100"></canvas></div>
        </section>

        <section id="tab-kitchen" class="hidden">
            <h2 class="text-2xl font-black mb-6">LIVE ORDERS</h2>
            <div id="kot-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section id="tab-inventory" class="hidden">
            <h2 class="text-2xl font-black mb-6 text-center">MENU MANAGEMENT</h2>
            <div id="menu-grid" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="tab-tables" class="hidden text-center">
            <h2 class="text-2xl font-black mb-6 italic">QR GENERATOR</h2>
            <div class="max-w-xs mx-auto card p-6">
                <input id="qr-table-num" type="number" placeholder="Table #" class="w-full border p-4 rounded-xl mb-4 font-bold text-center outline-none">
                <button onclick="generateQR()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black uppercase">Get QR Code</button>
                <div id="qrcode" class="mt-6 flex justify-center"></div>
            </div>
        </section>

        <section id="tab-settings" class="hidden">
            <h2 class="text-3xl font-black mb-8 italic">OS <span class="text-indigo-600">Settings</span></h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="card p-8">
                    <h4 class="font-black text-sm uppercase mb-6 flex items-center gap-2"><i class="fa-solid fa-palette"></i> Appearance</h4>
                    <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl dark:bg-slate-700">
                        <span class="font-bold">Dark Mode</span>
                        <button onclick="toggleTheme()" class="w-12 h-6 bg-slate-300 rounded-full relative transition-all" id="theme-toggle">
                            <div class="w-4 h-4 bg-white rounded-full absolute left-1 top-1 transition-all" id="toggle-circle"></div>
                        </button>
                    </div>
                    <p class="text-[10px] text-slate-400 mt-4 font-bold uppercase">Choose theme for night/day operations</p>
                </div>

                <div class="card p-8">
                    <h4 class="font-black text-sm uppercase mb-6 flex items-center gap-2"><i class="fa-solid fa-shop"></i> Cafe Status</h4>
                    <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl dark:bg-slate-700">
                        <span class="font-bold">Shop Open</span>
                        <input type="checkbox" checked class="w-6 h-6 accent-green-500">
                    </div>
                    <p class="text-[10px] text-slate-400 mt-4 font-bold uppercase">This will reflect on customer's menu</p>
                </div>

                <div class="card p-8 md:col-span-2">
                    <h4 class="font-black text-sm uppercase mb-6 flex items-center gap-2"><i class="fa-solid fa-plus-circle"></i> Add New Dish</h4>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input id="new-item-name" type="text" placeholder="Item Name" class="border p-4 rounded-xl font-bold bg-slate-50 text-slate-800">
                        <input id="new-item-price" type="number" placeholder="Price (₹)" class="border p-4 rounded-xl font-bold bg-slate-50 text-slate-800">
                        <select id="new-item-cat" class="border p-4 rounded-xl font-bold bg-slate-50 text-slate-800">
                            <option value="Burgers">Burgers</option>
                            <option value="Cold Coffee">Cold Coffee</option>
                            <option value="Pizza">Pizza</option>
                        </select>
                        <button onclick="addNewItem()" class="bg-indigo-600 text-white font-black rounded-xl p-4">SAVE ITEM</button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAlpRY4QJpcaZhR6PRshFBEaIt63zbammI",
            authDomain: "chaska-pos-4fb1a.firebaseapp.com",
            databaseURL: "https://chaska-pos-4fb1a-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "chaska-pos-4fb1a",
            storageBucket: "chaska-pos-4fb1a.firebasestorage.app",
            messagingSenderId: "878605199091",
            appId: "1:878605199091:web:2fd2757f8edd8e804bb986"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showTab(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active', 'text-white'));
            document.getElementById('btn-' + id).classList.add('nav-active');
            if(id === 'inventory') loadInventory();
        }

        // Toggle Dark/White Mode
        let isDark = false;
        function toggleTheme() {
            isDark = !isDark;
            const body = document.getElementById('admin-body');
            const toggle = document.getElementById('theme-toggle');
            const circle = document.getElementById('toggle-circle');
            
            if(isDark) {
                body.classList.add('dark-mode');
                toggle.style.background = '#4f46e5';
                circle.style.left = '26px';
            } else {
                body.classList.remove('dark-mode');
                toggle.style.background = '#cbd5e1';
                circle.style.left = '4px';
            }
        }

        // Menu Management Logic
        function addNewItem() {
            const name = document.getElementById('new-item-name').value;
            const price = document.getElementById('new-item-price').value;
            const category = document.getElementById('new-item-cat').value;
            if(!name || !price) return alert("Pura fill karo!");

            db.ref('menu').push({
                name, price: parseInt(price), category, inStock: true
            }).then(() => {
                alert("Naya item add ho gaya!");
                document.getElementById('new-item-name').value = '';
                document.getElementById('new-item-price').value = '';
            });
        }

        function loadInventory() {
            db.ref('menu').on('value', snap => {
                const grid = document.getElementById('menu-grid');
                grid.innerHTML = '';
                snap.forEach(c => {
                    const item = c.val();
                    grid.innerHTML += `<div class="card p-4 flex justify-between items-center text-[10px] font-bold">
                        <span>${item.name} (₹${item.price})</span>
                        <button onclick="db.ref('menu/${c.key}').remove()" class="text-red-500">DELETE</button>
                    </div>`;
                });
            });
        }

        // QR Generator
        function generateQR() {
            const num = document.getElementById('qr-table-num').value;
            if(!num) return;
            const box = document.getElementById('qrcode'); box.innerHTML = '';
            new QRCode(box, { text: `https://mikey-metrics.github.io/chaska/index.html?table=${num}`, width: 150, height: 150 });
        }

        // Orders Tracking
        db.ref('orders').on('value', snap => {
            const kot = document.getElementById('kot-list');
            kot.innerHTML = '';
            let count = 0; let totalSale = 0;
            snap.forEach(o => {
                const order = o.val();
                if(order.status === 'pending') {
                    kot.innerHTML += `<div class="card p-6 border-t-4 border-orange-500">
                        <h4 class="font-black uppercase text-sm">${order.items}</h4>
                        <p class="text-xs font-bold text-slate-400 mt-2">Table: ${order.table_no}</p>
                        <button onclick="db.ref('orders/${o.key}').update({status:'ready'})" class="mt-4 w-full bg-indigo-600 text-white p-2 rounded-xl text-[10px] font-black">READY</button>
                    </div>`;
                }
                if(order.payment === 'done') totalSale += order.bill_amount;
                count++;
            });
            document.getElementById('stat-sales').innerText = "₹" + totalSale;
            document.getElementById('stat-orders').innerText = count;
        });

    </script>
</body>
</html>
