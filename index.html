<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikey Metrics | Cafe Pro Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .nav-active { background: #4f46e5; color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
        .glass { background: white; border-radius: 24px; border: 1px solid #e2e8f0; transition: 0.3s; }
        .hidden { display: none !important; }
        @media print { .no-print { display: none !important; } #print-area { display: block !important; } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <aside class="w-64 bg-white border-r flex flex-col p-6 shrink-0 no-print">
        <div class="mb-8 text-center border-b pb-6">
            <h1 class="text-xl font-extrabold text-indigo-600 italic">MIKEY <span class="text-slate-900">METRICS</span></h1>
            <p class="text-[9px] font-bold uppercase tracking-widest text-slate-400 mt-1">Cafe OS v2.0</p>
        </div>
        
        <nav class="space-y-2 flex-1 text-sm font-bold">
            <button onclick="showTab('dash')" id="btn-dash" class="nav-active w-full p-4 rounded-2xl flex items-center gap-3 transition-all"><i class="fa-solid fa-chart-simple"></i> Dashboard</button>
            <button onclick="showTab('kitchen')" id="btn-kitchen" class="w-full p-4 text-slate-400 rounded-2xl flex items-center gap-3 transition-all"><i class="fa-solid fa-fire-burner"></i> Kitchen (KOT)</button>
            <button onclick="showTab('bills')" id="btn-bills" class="w-full p-4 text-slate-400 rounded-2xl flex items-center gap-3 transition-all"><i class="fa-solid fa-file-invoice"></i> Billing</button>
            <button onclick="showTab('inventory')" id="btn-inventory" class="w-full p-4 text-slate-400 rounded-2xl flex items-center gap-3 transition-all"><i class="fa-solid fa-box-open"></i> Inventory/Menu</button>
            <button onclick="showTab('tables')" id="btn-tables" class="w-full p-4 text-slate-400 rounded-2xl flex items-center gap-3 transition-all"><i class="fa-solid fa-qrcode"></i> Table QRs</button>
            <button onclick="showTab('expenses')" id="btn-expenses" class="w-full p-4 text-slate-400 rounded-2xl flex items-center gap-3 transition-all"><i class="fa-solid fa-hand-holding-dollar"></i> Expenses</button>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto p-8 no-print">
        
        <section id="tab-dash">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-extrabold tracking-tight italic">Business <span class="text-indigo-600">Overview</span></h2>
                <span class="text-xs font-bold bg-indigo-50 text-indigo-600 px-4 py-2 rounded-full" id="live-time"></span>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="glass p-6"><p class="text-[10px] font-black text-slate-400 uppercase">Today's Sales</p><h3 id="stat-sales" class="text-2xl font-black italic">₹0</h3></div>
                <div class="glass p-6"><p class="text-[10px] font-black text-slate-400 uppercase">Active KOT</p><h3 id="stat-kot" class="text-2xl font-black italic text-orange-500">0</h3></div>
                <div class="glass p-6"><p class="text-[10px] font-black text-slate-400 uppercase">Daily Profit</p><h3 id="stat-profit" class="text-2xl font-black italic text-green-600">₹0</h3></div>
                <div class="glass p-6"><p class="text-[10px] font-black text-slate-400 uppercase">Total Expenses</p><h3 id="stat-exp" class="text-2xl font-black italic text-red-600">₹0</h3></div>
            </div>

            <div class="glass p-8 mb-8">
                <div class="flex justify-between mb-6"><h4 class="font-bold text-xs uppercase text-slate-400">Revenue Growth</h4></div>
                <canvas id="mainChart" height="100"></canvas>
            </div>
        </section>

        <section id="tab-kitchen" class="hidden">
            <h2 class="text-3xl font-extrabold mb-8 uppercase italic">Live <span class="text-orange-500 underline">Tickets</span></h2>
            <div id="kot-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section id="tab-bills" class="hidden">
            <h2 class="text-3xl font-extrabold mb-8 uppercase italic">Unpaid <span class="text-green-600 underline">Orders</span></h2>
            <div id="billing-list" class="space-y-4"></div>
        </section>

        <section id="tab-inventory" class="hidden">
            <h2 class="text-3xl font-extrabold mb-8 uppercase italic">Stock <span class="text-slate-400">Control</span></h2>
            <div id="menu-grid" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="tab-tables" class="hidden">
            <h2 class="text-3xl font-extrabold mb-8 uppercase italic text-indigo-600 underline">Table Setup</h2>
            <div class="grid grid-cols-2 gap-8">
                <div class="glass p-8">
                    <input id="qr-table-num" type="number" placeholder="Enter Table Number" class="w-full border-2 p-4 rounded-2xl mb-4 font-bold outline-none focus:border-indigo-500">
                    <button onclick="generateQR()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Generate Table QR</button>
                </div>
                <div class="glass p-8 flex flex-col items-center justify-center">
                    <div id="qrcode" class="mb-4"></div>
                    <h3 id="qr-label" class="text-xl font-bold"></h3>
                    <button onclick="window.print()" class="text-xs font-bold text-indigo-500 uppercase mt-4 underline">Print Sticker</button>
                </div>
            </div>
        </section>

        <section id="tab-expenses" class="hidden">
            <h2 class="text-3xl font-extrabold mb-8 uppercase italic text-red-600 underline">Daily Expenses</h2>
            <div class="glass p-8 max-w-lg mx-auto">
                <input id="exp-item" type="text" placeholder="Saman ka naam (e.g. Doodh)" class="w-full border p-4 rounded-xl mb-3 font-bold">
                <input id="exp-amt" type="number" placeholder="Amount (₹)" class="w-full border p-4 rounded-xl mb-4 font-bold">
                <button onclick="addExpense()" class="w-full bg-red-600 text-white py-4 rounded-xl font-black uppercase">Add Kharcha</button>
            </div>
            <div id="expense-list" class="mt-8 space-y-2"></div>
        </section>

    </main>

    <div id="print-area" class="hidden text-center p-10 font-mono"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAlpRY4QJpcaZhR6PRshFBEaIt63zbammI",
            authDomain: "chaska-pos-4fb1a.firebaseapp.com",
            databaseURL: "https://chaska-pos-4fb1a-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "chaska-pos-4fb1a",
            storageBucket: "chaska-pos-4fb1a.firebasestorage.app",
            messagingSenderId: "878605199091",
            appId: "1:878605199091:web:2fd2757f8edd8e804bb986"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let chart; let lastCount = 0;
        const ctx = document.getElementById('mainChart').getContext('2d');

        function showTab(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active', 'text-white'));
            document.getElementById('btn-' + id).classList.add('nav-active');
            if(id === 'inventory') loadInventory();
            if(id === 'expenses') loadExpenses();
        }

        // --- REAL TIME ORDERS & ANALYTICS ---
        db.ref('orders').on('value', snap => {
            const data = snap.val(); if(!data) return;
            const kotBox = document.getElementById('kot-list');
            const billBox = document.getElementById('billing-list');
            kotBox.innerHTML = ''; billBox.innerHTML = '';

            let todaySale = 0; let pendingKot = 0; let chartData = {};
            const today = new Date().toLocaleDateString();

            if(Object.keys(data).length > lastCount && lastCount !== 0) document.getElementById('notif-sound').play();
            lastCount = Object.keys(data).length;

            Object.entries(data).reverse().forEach(([id, o]) => {
                const oDate = new Date(o.timestamp).toLocaleDateString();
                const amt = parseInt(o.bill_amount) || 150;

                if(o.payment === 'done') {
                    if(oDate === today) todaySale += amt;
                    chartData[oDate] = (chartData[oDate] || 0) + amt;
                }

                if(o.status === 'pending') {
                    pendingKot++;
                    kotBox.innerHTML += `
                    <div class="glass p-6 border-t-8 border-orange-500 shadow-xl">
                        <div class="flex justify-between font-black mb-4"><span class="text-orange-500">TABLE #${o.table_no}</span><span>${new Date(o.timestamp).toLocaleTimeString()}</span></div>
                        <h4 class="text-lg font-bold uppercase mb-6">${o.items}</h4>
                        <div class="flex gap-2">
                            <button onclick="printKOT('${o.table_no}', '${o.items}')" class="flex-1 bg-slate-100 py-3 rounded-xl font-bold text-xs uppercase"><i class="fa-solid fa-print"></i> KOT</button>
                            <button onclick="db.ref('orders/${id}').update({status:'ready'})" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold text-xs uppercase">Mark Ready</button>
                        </div>
                    </div>`;
                }

                if(o.payment !== 'done') {
                    billBox.innerHTML += `
                    <div class="glass p-5 flex justify-between items-center">
                        <div><p class="text-xs font-black">TABLE #${o.table_no} | ${o.customer_name}</p><h4 class="text-sm font-bold text-slate-500">${o.items}</h4></div>
                        <div class="flex gap-2">
                            <button onclick="printBill('${o.table_no}', '${o.items}')" class="bg-indigo-50 text-indigo-600 px-6 py-2 rounded-xl font-bold text-xs uppercase">Print Bill</button>
                            <button onclick="settleBill('${id}')" class="bg-green-600 text-white px-6 py-2 rounded-xl font-bold text-xs uppercase">Paid Cash</button>
                        </div>
                    </div>`;
                }
            });

            document.getElementById('stat-sales').innerText = "₹" + todaySale;
            document.getElementById('stat-kot').innerText = pendingKot;
            updateChart(chartData);
            calculateProfit(todaySale);
        });

        // --- EXPENSES LOGIC ---
        function addExpense() {
            const item = document.getElementById('exp-item').value;
            const amt = document.getElementById('exp-amt').value;
            if(!item || !amt) return;
            db.ref('expenses').push({ item, amt: parseInt(amt), date: new Date().toLocaleDateString() });
            document.getElementById('exp-item').value = ''; document.getElementById('exp-amt').value = '';
        }

        function loadExpenses() {
            db.ref('expenses').on('value', snap => {
                const list = document.getElementById('expense-list'); list.innerHTML = '';
                let totalExp = 0; const today = new Date().toLocaleDateString();
                const data = snap.val(); if(!data) return;
                Object.entries(data).reverse().forEach(([id, e]) => {
                    if(e.date === today) totalExp += e.amt;
                    list.innerHTML += `<div class="glass p-4 flex justify-between"><span>${e.item}</span><span class="font-bold text-red-600">₹${e.amt}</span></div>`;
                });
                document.getElementById('stat-exp').innerText = "₹" + totalExp;
            });
        }

        function calculateProfit(sale) {
            db.ref('expenses').once('value', snap => {
                let totalExp = 0; const today = new Date().toLocaleDateString();
                snap.forEach(child => { if(child.val().date === today) totalExp += child.val().amt; });
                document.getElementById('stat-profit').innerText = "₹" + (sale - totalExp);
            });
        }

        // --- OTHER FUNCTIONS ---
        function settleBill(id) {
            const val = prompt("Enter Final Amount:", "150");
            if(val) db.ref('orders/'+id).update({ payment: 'done', bill_amount: parseInt(val) });
        }

        function generateQR() {
            const num = document.getElementById('qr-table-num').value;
            if(!num) return;
            const box = document.getElementById('qrcode'); box.innerHTML = '';
            const url = `https://mikey-metrics.github.io/chaska/index.html?table=${num}`;
            new QRCode(box, { text: url, width: 180, height: 180 });
            document.getElementById('qr-label').innerText = "Table #" + num;
        }

        function loadInventory() {
            db.ref('menu').on('value', snap => {
                const grid = document.getElementById('menu-grid'); grid.innerHTML = '';
                const data = snap.val(); if(!data) return;
                Object.entries(data).forEach(([id, item]) => {
                    grid.innerHTML += `<div class="glass p-4 flex justify-between items-center"><p class="font-bold text-[10px] uppercase">${item.name}</p>
                    <button onclick="db.ref('menu/${id}').update({inStock:${!item.inStock}})" class="px-3 py-1 rounded-lg font-black text-[9px] ${item.inStock?'bg-green-100 text-green-600':'bg-red-100 text-red-600'}">${item.inStock?'In Stock':'Out'}</button></div>`;
                });
            });
        }

        function updateChart(cData) {
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: Object.keys(cData), datasets: [{ label: 'Sales', data: Object.values(cData), borderColor: '#4f46e5', tension: 0.4, fill: true, backgroundColor: 'rgba(79, 70, 229, 0.05)' }] },
                options: { plugins: { legend: { display: false } } }
            });
        }

        function printKOT(table, items) {
            const area = document.getElementById('print-area');
            area.innerHTML = `<h2>KITCHEN TICKET</h2><hr><p><b>TABLE #${table}</b></p><p>${items.replace(/,/g, '<br>')}</p><hr><p>${new Date().toLocaleTimeString()}</p>`;
            window.print();
        }

        function printBill(table, items) {
            const area = document.getElementById('print-area');
            area.innerHTML = `<h1>CHASKA CAFE</h1><p>Receipt</p><hr><p><b>TABLE #${table}</b></p><p>${items.replace(/,/g, '<br>')}</p><hr><h3>TOTAL: [Manual Entry]</h3><p>Visit Again!</p>`;
            window.print();
        }

        setInterval(() => { document.getElementById('live-time').innerText = new Date().toLocaleString(); }, 1000);
    </script>
</body>
</html>
