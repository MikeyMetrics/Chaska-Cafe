<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaska Cafe - Digital Menu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-pill { background-color: #ea580c !important; color: white !important; shadow: 0 10px 15px -3px rgba(234, 88, 12, 0.4); }
    </style>
</head>
<body class="bg-slate-50 pb-40">

    <div class="bg-white p-6 shadow-sm sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black text-orange-600 italic leading-none">CHASKA CAFE</h1>
            <p id="table-id" class="text-[10px] font-bold text-slate-400 mt-1 tracking-widest uppercase">Table: Loading...</p>
        </div>
        <div class="bg-green-100 text-green-700 px-2 py-1 rounded text-[10px] font-bold">100% VEG</div>
    </div>

    <div class="flex gap-3 overflow-x-auto p-4 no-scrollbar sticky top-[88px] bg-slate-50 z-40">
        <button onclick="filterMenu('Popular', this)" class="category-btn active-pill bg-white text-slate-600 px-6 py-2 rounded-2xl text-sm font-bold border shadow-sm whitespace-nowrap">Popular</button>
        <button onclick="filterMenu('Pizza', this)" class="category-btn bg-white text-slate-600 px-6 py-2 rounded-2xl text-sm font-bold border shadow-sm whitespace-nowrap">Pizza</button>
        <button onclick="filterMenu('Maggi', this)" class="category-btn bg-white text-slate-600 px-6 py-2 rounded-2xl text-sm font-bold border shadow-sm whitespace-nowrap">Maggi</button>
        <button onclick="filterMenu('Drinks', this)" class="category-btn bg-white text-slate-600 px-6 py-2 rounded-2xl text-sm font-bold border shadow-sm whitespace-nowrap">Drinks</button>
    </div>

    <div id="full-menu" class="px-4 space-y-4">
        </div>

    <div id="cart-drawer" class="hidden fixed bottom-24 left-4 right-4 bg-white p-5 rounded-[2rem] shadow-[0_-10px_40px_rgba(0,0,0,0.1)] z-[100] border border-slate-100">
        <h3 class="text-slate-800 font-black text-xs mb-3 flex justify-between uppercase tracking-widest">
            <span>Selected Items</span>
            <button onclick="clearCart()" class="text-red-500">Clear</button>
        </h3>
        <div id="items-list" class="space-y-2 max-h-32 overflow-y-auto font-bold text-sm text-slate-600 italic">
            </div>
    </div>

    <div id="order-bar" class="hidden fixed bottom-6 left-4 right-4 bg-slate-900 text-white p-5 rounded-[2.5rem] shadow-2xl flex justify-between items-center z-[110]">
        <div>
            <p id="total-count" class="text-[10px] font-black text-orange-500 tracking-widest uppercase">0 Items</p>
            <p id="total-price" class="text-xl font-black">₹0</p>
        </div>
        <button onclick="sendOrder()" id="send-btn" class="bg-orange-600 px-8 py-3 rounded-2xl font-black text-sm shadow-lg active:scale-95 transition-all">
            PLACE ORDER 🚀
        </button>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const SUPABASE_URL = 'https://YOUR_URL.supabase.co'; // <--- Yahan apna URL dalo
        const SUPABASE_KEY = 'bnhgpbzyifpgwrnenvip'; // <--- Key set hai
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. MENU DATA ---
        const menuItems = [
            { name: 'Kulhad Pizza', price: 149, cat: 'Pizza', emoji: '🏺' },
            { name: 'Cheese Burger', price: 89, cat: 'Popular', emoji: '🍔' },
            { name: 'Peri Peri Maggi', price: 70, cat: 'Maggi', emoji: '🍜' },
            { name: 'Cold Coffee', price: 120, cat: 'Drinks', emoji: '🥤' },
            { name: 'Chaska Chai', price: 20, cat: 'Drinks', emoji: '☕' }
        ];

        let cart = [];
        let total = 0;

        // Table Detect
        const params = new URLSearchParams(window.location.search);
        const tableNo = params.get('table') || "Walking";
        document.getElementById('table-id').innerText = "TABLE: #" + tableNo;

        // --- 3. FILTER LOGIC ---
        function filterMenu(category, btn) {
            // Button color change logic
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active-pill'));
            if(btn) btn.classList.add('active-pill');

            const container = document.getElementById('full-menu');
            container.innerHTML = '';

            const filtered = menuItems.filter(item => item.cat === category || category === 'All');

            filtered.forEach(item => {
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <div class="w-16 h-16 bg-orange-50 rounded-2xl flex items-center justify-center text-4xl">${item.emoji}</div>
                            <div>
                                <h3 class="font-bold text-slate-800 text-sm">${item.name}</h3>
                                <p class="text-orange-600 font-black">₹${item.price}</p>
                            </div>
                        </div>
                        <button onclick="addToCart('${item.name}', ${item.price})" class="bg-white text-green-600 border border-green-500 px-6 py-2 rounded-xl font-black text-xs shadow-sm">ADD</button>
                    </div>`;
            });
        }

        // --- 4. CART LOGIC ---
        function addToCart(name, price) {
            cart.push(name);
            total += price;

            // Show UI
            document.getElementById('cart-drawer').classList.remove('hidden');
            document.getElementById('order-bar').classList.remove('hidden');

            // Add to list
            const list = document.getElementById('items-list');
            list.innerHTML += `<div class="flex justify-between border-b pb-1"><span>${name}</span><span>₹${price}</span></div>`;

            // Update Totals
            document.getElementById('total-count').innerText = cart.length + " Items Added";
            document.getElementById('total-price').innerText = "₹" + total;

            if (navigator.vibrate) navigator.vibrate(50);
        }

        function clearCart() {
            cart = []; total = 0;
            document.getElementById('items-list').innerHTML = '';
            document.getElementById('cart-drawer').classList.add('hidden');
            document.getElementById('order-bar').classList.add('hidden');
        }

        // --- 5. SEND TO SUPABASE ---
        async function sendOrder() {
            const btn = document.getElementById('send-btn');
            btn.innerText = "WAITING...";
            btn.disabled = true;

            const { error } = await _supabase.from('orders').insert([
                { items: cart.join(", "), table_no: tableNo, status: 'pending' }
            ]);

            if(!error) {
                alert("Order Placed! Jhalrapatan mein dhoom machao! ✅");
                clearCart();
            } else {
                alert("Error! Check internet.");
            }
            btn.innerText = "PLACE ORDER 🚀";
            btn.disabled = false;
        }

        // Initial Load
        window.onload = () => filterMenu('Popular');
    </script>
</body>
</html>
